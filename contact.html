<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Flynto AI Tools Directory</title>
  <meta name="description" content="Contact the Flynto team. We'd love to hear from you." />
  <link rel="canonical" href="https://flynto.online/contact.html" />
  <meta property="og:title" content="Contact — Flynto" />
  <meta property="og:url" content="https://flynto.online/contact.html" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0f; --surface: #111118; --surface2: #18181f; --border: #2a2a35; --accent: #6c63ff; --accent2: #00d4aa; --text: #e8e8f0; --muted: #888899; --card-bg: #13131a; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }
    nav { position: sticky; top: 0; z-index: 100; background: rgba(10,10,15,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; color: var(--text); text-decoration: none; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }

    .page-hero { padding: 72px 24px 48px; text-align: center; }
    .page-hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
    .page-hero h1 span { background: linear-gradient(135deg, #6c63ff, #00d4aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .page-hero p { color: var(--muted); font-size: 1rem; }

    .container { max-width: 600px; margin: 0 auto; padding: 0 24px 80px; }

    .contact-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
    }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 8px; color: var(--text); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
    .form-group input::placeholder, .form-group textarea::placeholder { color: var(--muted); }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .form-group select option { background: var(--surface2); }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.99); }

    .note { font-size: 0.78rem; color: var(--muted); margin-top: 16px; text-align: center; }

    .success-msg { display: none; background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.3); border-radius: 10px; padding: 16px; text-align: center; color: #00d4aa; font-size: 0.9rem; margin-top: 16px; }
    .success-msg.show { display: block; }

    footer { background: var(--surface); border-top: 1px solid var(--border); padding: 32px 24px; text-align: center; }
    footer .footer-links { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
    footer a { color: var(--muted); text-decoration: none; font-size: 0.82rem; transition: color 0.2s; }
    footer a:hover { color: var(--text); }
    footer p { font-size: 0.78rem; color: #444455; }

    @media(max-width:640px) { .nav-links { display: none; } .contact-card { padding: 24px; } }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="https://flynto.online/" class="logo">Fly<span>nto</span></a>
    <div class="nav-links">
      <a href="https://flynto.online/">Home</a>
      <a href="https://flynto.online/about.html">About</a>
      <a href="https://flynto.online/contact.html">Contact</a>
    </div>
  </div>
</nav>

<section class="page-hero">
  <h1>Get in <span>Touch</span></h1>
  <p>Have a question or feedback? We'd love to hear from you.</p>
</section>

<div class="container">
  <div class="contact-card">
    <form id="contactForm">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" placeholder="Enter your name" required />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject">
          <option value="general">General Inquiry</option>
          <option value="feedback">Feedback</option>
          <option value="bug">Report an Issue</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Write your message here..." required></textarea>
      </div>
      <button type="submit" class="submit-btn">Send Message</button>
      <p class="note">We typically respond within 1–2 business days.</p>
      <div class="success-msg" id="successMsg">✅ Message sent! We'll get back to you soon.</div>
    </form>
  </div>
</div>

<footer>
  <div class="footer-links">
    <a href="https://flynto.online/">Home</a>
    <a href="https://flynto.online/about.html">About</a>
    <a href="https://flynto.online/privacy.html">Privacy Policy</a>
    <a href="https://flynto.online/disclaimer.html">Disclaimer</a>
    <a href="https://flynto.online/contact.html">Contact</a>
  </div>
  <p>© 2026 Flynto. All rights reserved.</p>
</footer>

<script>
  document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault();
    document.getElementById('successMsg').classList.add('show');
    this.reset();
    setTimeout(() => document.getElementById('successMsg').classList.remove('show'), 5000);
  });
</script>
</body>
</html>
